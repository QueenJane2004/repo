<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Borrows | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; }
        .nav-pills .nav-link { color: #64748b; border-radius: 10px; font-weight: 600; margin-right: 10px; }
        .nav-pills .nav-link.active { background: #3b82f6; color: white; }
        .card { border: none; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">Borrowing Requests</h3>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary rounded-pill">Back</a>
        </div>

        <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pending">Pending</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#approved">Approved</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#onborrow">On Borrow</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#returned">Returned</button></li>
            <li class="nav-item"><button class="nav-link text-danger" data-bs-toggle="pill" data-bs-target="#cancelled">Cancelled</button></li>
        </ul>

        <div class="tab-content card p-3">
            <!-- Reuse this table structure inside each tab-pane using logic -->
            <div class="tab-pane fade show active" id="pending">
                <table class="table align-middle">
                    <thead><tr><th>User</th><th>Book</th><th>Requested Date</th><th>Actions</th></tr></thead>
                    <tbody>
                        {% for req in requests if req.status == 'Pending' %}
                        <tr>
                            <td>{{ req.user_name }} ({{ req.user_role }})</td>
                            <td>{{ req.book_title }}</td>
                            <td>{{ req.issue_date }}</td>
                            <td>
                                <button class="btn btn-sm btn-success rounded-pill">Approve</button>
                                <button class="btn btn-sm btn-danger rounded-pill">Cancel</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <!-- Additional Tab Panes (approved, onborrow, etc.) follow same logic -->
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
