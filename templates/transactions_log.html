<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions | Digital Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gradient-main: linear-gradient(135deg, #2e1065 0%, #3b82f6 100%); }
        body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }
        .sidebar {
            width: 240px; min-height: 100vh;
            background: var(--gradient-main);
            position: fixed; top: 0; left: 0;
            z-index: 100; padding: 2rem 1rem;
            display: flex; flex-direction: column;
        }
        .sidebar .brand { color: white; font-size: 1.1rem; font-weight: 700; margin-bottom: 2rem; }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.75); border-radius: 12px;
            padding: 0.75rem 1rem; margin-bottom: 4px;
            transition: all 0.2s; font-size: 0.9rem;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: rgba(255,255,255,0.15); color: white;
        }
        .sidebar .nav-link i { width: 20px; }
        .main-content { margin-left: 240px; padding: 2rem; }
        /* For non-admin (user), no sidebar */
        .user-nav {
            background: var(--gradient-main);
            padding: 1rem 0;
        }
        .section-card {
            background: white; border: none;
            border-radius: 18px; padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .table th { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; font-weight: 600; }
        .status-badge { font-size: 0.72rem; padding: 4px 10px; border-radius: 20px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; min-height: auto; position: relative; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
