<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Digital Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2e1065 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 420px;
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #2e1065, #3b82f6);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e2e8f0;
        }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .btn-primary {
            background: linear-gradient(135deg, #2e1065, #3b82f6);
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
        }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container px-3">
        <div class="card p-4 p-md-5 mx-auto">
            <div class="brand-icon">
                <i class="fas fa-book-open-reader text-white fs-4"></i>
            </div>
            <h4 class="text-center fw-bold mb-1">Digital Library</h4>
            <p class="text-center text-muted small mb-4">Sign in to your account</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}{% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }} alert-dismissible fade show rounded-3 border-0 small">
                        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius:12px 0 0 12px;">
                            <i class="fas fa-user text-muted"></i>
                        </span>
                        <input type="text" name="username" class="form-control border-start-0"
                               style="border-radius:0 12px 12px 0;"
                               placeholder="Enter username" required autocomplete="username">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius:12px 0 0 12px;">
                            <i class="fas fa-lock text-muted"></i>
                        </span>
                        <input type="password" name="password" id="passwordField" class="form-control border-start-0"
                               style="border-radius:0 12px 12px 0;"
                               placeholder="Enter password" required autocomplete="current-password">
                        <button type="button" class="btn btn-light border ms-1 rounded-3"
                                onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
                <p class="text-center text-muted small mb-0">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-primary fw-semibold text-decoration-none">Register</a>
                </p>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const f = document.getElementById('passwordField');
            const i = document.getElementById('eyeIcon');
            f.type = f.type === 'password' ? 'text' : 'password';
            i.classList.toggle('fa-eye');
            i.classList.toggle('fa-eye-slash');
        }
    </script>
</body>
</html>
