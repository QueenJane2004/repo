<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Secure Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .lms-wrapper {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            margin: 20px;
        }
        .brand-header {
            background: linear-gradient(135deg, #2e1065 0%, #3b82f6 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }
        .brand-header i  { font-size: 3rem; margin-bottom: 10px; display: block; }
        .brand-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
        .brand-header p  { font-size: 0.9rem; opacity: 0.9; margin-top: 8px; margin-bottom: 0; }
        .form-section    { padding: 40px; }
        .section-title   { font-size: 1.1rem; font-weight: 600; color: #1e293b; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .form-control {
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
            border-radius: 10px;
            background-color: #f1f5f9;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }
        .btn-login {
            background-color: #2e1065;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
        }
        .btn-login:hover {
            background-color: #1e1b4b;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            color: white;
        }
        .register-footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .register-footer p { font-size: 0.9rem; color: #64748b; margin: 0; }
        .register-footer a { color: #3b82f6; text-decoration: none; font-weight: 600; }
        .register-footer a:hover { text-decoration: underline; }
        .alert { border-radius: 10px; font-size: 0.85rem; border: none; }
    </style>
</head>
<body>
    <div class="lms-wrapper">
        <div class="brand-header">
            <i class="bi bi-book-half"></i>
            <h1>Library Management System</h1>
            <p>Your Gateway to Knowledge & Digital Resources</p>
        </div>
        <div class="form-section">
            <div class="section-title">
                <i class="bi bi-shield-lock"></i> Account Login
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for cat, msg in messages %}
                        <div class="alert alert-{{ cat }} shadow-sm mb-3">{{ msg }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label small text-muted">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-login">Login</button>
            </form>

            <div class="register-footer">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
